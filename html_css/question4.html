<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Types of CSS</title>
    <style>
        #p1{
            color: lightblue;
        }
    </style>
    <link rel="stylesheet" href="external.css" >
</head>
<body>
    <h1 align="center" >This page demonstrate the different types of css</h1>
    <p style="color: pink;">This paragraph use inline css</p>
    <P id="p1">This paragraph use internal css</P>
    <P id="p2">This paragraph use external css</P>
</body>
</html>
